<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль | CROWN Game Store</title>
  <link rel="stylesheet" href="profile.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <!-- ===== HEADER ===== -->
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Crown Logo">
      <span>CROWN</span>
    </div>
    <nav>
      <ul>
        <li><a href="layout.html">МАГАЗИН</a></li>
        <li><a href="gallery.html">ГАЛЕРЕЯ</a></li>
        <li><a href="Karzina.html">КОРЗИНА</a></li>
        <li><a href="profile.html" class="active">ПРОФИЛЬ</a></li>
      </ul>
    </nav>
  </header>

  <!-- ===== PROFILE SECTION ===== -->
  <main class="profile-page">
    <section class="profile-box">
      <div class="profile-header">
        <img id="avatar" src="images/default-avatar.webp" alt="Аватар" class="profile-avatar">
        <div class="profile-info">
          <h2 id="username">Имя: —</h2>
          <p id="email">Email: —</p>
        </div>
      </div>
      <button class="logout-btn">Выйти из аккаунта</button>
    </section>

    <section class="purchase-history">
      <h3>🛒 История покупок</h3>
      <div id="purchase-list" class="purchase-list">
        <p>Пока нет покупок</p>
      </div>
      <button class="clear-history-btn">Очистить историю</button>
    </section>
  </main>

  <footer>
    <p>© 2025 CROWN Game Store. Все права защищены.</p>
  </footer>

  <script src="profile.js"></script>
  <script src="sound.js"></script>
</body>
</html>
