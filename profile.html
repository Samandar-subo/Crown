<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль | CROWN Game Store</title>
  <link rel="stylesheet" href="profile.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <!-- ===== HEADER ===== -->
  <header>
  <div class="logo">
    <a href="layout.html">
      <img src="images/logo.png" alt="Crown Logo">
    </a>
    <span>CROWN</span>
  </div>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="gallery.html">ГАЛЕРЕЯ</a></li>
          <li class="nav-item"><a class="nav-link" href="layout.html">МАГАЗИН</a></li>
          <li class="nav-item"><a class="nav-link" href="Karzina.html" class="active">КОРЗИНА</a></li>
          <li class="nav-item"><a class="nav-link" href="about_us.html">О НАС</a></li>
        </ul>
      </div>
    </div>
  </nav>
</header>
  

  <!-- ===== MAIN PROFILE AREA ===== -->
  <main class="profile-container">
    <!-- Левая часть -->
    <section class="profile-left">
      <div class="user-info">
        <img id="avatar" src="images/default-avatar.webp" alt="Аватар" class="profile-avatar">
        <h2 id="username">Имя: —</h2>
        <p id="email">Email: —</p>
        <button class="logout-btn">Выйти из аккаунта</button>
      </div>


      <div class="purchase-history">
        <h3>🛒 История покупок</h3>
        <div id="purchase-list" class="purchase-list">
          <p>Пока нет покупок</p>
        </div>
        <button class="clear-history-btn">Очистить историю</button>
      </div>
    </section>

    <!-- Правая часть -->
    <aside class="profile-right">
      <div class="level-box">
        <p class="level-title">Уровень</p>
        <div class="level-circle">2</div>
        <button class="edit-profile-btn">Редактировать профиль</button>
      </div>

      <div class="stats">
        <h4>Статистика</h4>
        <p>Значков: 2</p>
        <p>Игр: 6</p>
        <p>Скриншоты: 3</p>
      </div>

      <div class="theme-toggle">
  <button id="themeToggleBtn" class="theme-btn">🌙Тёмная тема</button>
</div>
    </aside>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>© 2025 CROWN Game Store. Все права защищены.</p>
  </footer>

  <script src="profile.js"></script>
  <script src="sound.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
