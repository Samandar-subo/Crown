<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Login - CROWN Game Store</title>
  <link rel="stylesheet" href="style_reg1.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div id="scrollProgress"></div>
  <div id="progressBar"></div>
  
  <!-- Фон glow -->
  <div class="background-glow"></div>

  <!-- Header -->
  <header class="login-header">
    <div class="logo">
      
        <img src="images/logo.png" alt="Crown Logo">
      
      <span>CROWN</span>
    </div>
  </header>

  <div class="login-container">
    <div class="login-box">
      <h1>Вход в аккаунт</h1>
      <form id="loginForm" action="Layout.html" method="get">
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" required>
          <div class="error-message" id="emailError"></div>
        </div>
        
        <div class="form-group">
          <label for="password">Пароль:</label>
          <input type="password" id="password" required>
          <div class="error-message" id="passwordError"></div>
        </div>
        
        <button type="submit" class="login-btn">Войти</button>
      </form>
      
      <div class="links">
        <a href="registration.html">Зарегистрироваться</a>
        <a href="#" class="forgot-password">Забыли пароль?</a>
      </div>
    </div>
  </div>

  <!-- Уведомление -->
  <div id="notification" class="notification-hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="registr.js"></script>
  <script src="sound.js"></script>
</body>
</html>
