<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - CROWN Game Store</title>
    <link rel="stylesheet" href="style_reg2.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div id="scrollProgress"></div>
  <div id="progressBar"></div>
  
  <!-- Фон glow -->
  <div class="background-glow"></div>

  <!-- Header -->
  <header class="login-header">
    <div class="logo">
        <img src="images/logo.png" alt="Crown Logo">
      <span>CROWN</span>
    </div>
  </header>

  <div class="registration-container">
    <div class="registration-box">
      <h2>Регистрация</h2>
      
      <form id="registrationForm" method="get">
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="username">Имя пользователя:</label>
          <input type="text" id="username" name="name" required>
          <div class="error-message" id="usernameError"></div>
        </div>
        
        <div class="form-group">
          <label for="password">Пароль:</label>
          <input type="password" id="password" name="password" required>
          <div class="error-message" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="repeatPassword">Повторите пароль:</label>
          <input type="password" id="repeatPassword" name="repeat-password" required>
          <div class="error-message" id="repeatPasswordError"></div>
        </div>

        <button type="submit" class="register-btn">Зарегистрироваться</button>
      </form>
      
      <div class="links">
        <a href="registr.html">Уже есть аккаунт? Войти</a>
      </div>
    </div>
  </div>

  <!-- Уведомление -->
  <div id="notification" class="notification-hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="registr2.js"></script>
  <script src="sound.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</body>
</html>
